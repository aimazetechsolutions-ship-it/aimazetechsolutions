<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AimAze Admin Editor</title><style>body{font-family:Inter,Arial,sans-serif;margin:0;background:#f5fbfd;color:#101729}.wrap{max-width:1100px;margin:auto;padding:28px}.card{background:white;border:1px solid #dce7ef;border-radius:18px;padding:22px;margin:16px 0}label{font-weight:800;display:block;margin:12px 0 6px}input,textarea{width:100%;padding:12px;border:1px solid #dce7ef;border-radius:10px}textarea{min-height:90px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}button{background:linear-gradient(135deg,#27c7d7,#3f83df,#70419a);color:white;border:0;border-radius:12px;padding:14px 20px;font-weight:900}.preview{border:1px solid #dce7ef;border-radius:14px;overflow:hidden;height:480px;background:white}iframe{width:100%;height:100%;border:0}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>AimAze Visual Admin Editor</h1><p>Edit content, download content.json, then upload it to GitHub. Cloudflare will redeploy automatically.</p><div class="grid"><div class="card"><label>Website Title</label><input id="title"><label>Hero Title</label><textarea id="heroTitle"></textarea><label>Hero Text</label><textarea id="heroText"></textarea><label>Email</label><input id="email"><label>WhatsApp Number</label><input id="whatsapp" placeholder="971501234567"><label>Theme Cyan</label><input id="cyan" type="color"><label>Theme Blue</label><input id="blue" type="color"><label>Theme Orange</label><input id="orange" type="color"><label>Theme Purple</label><input id="purple" type="color"><br><br><button onclick="downloadJson()">Download Updated content.json</button></div><div class="card"><h2>Website Preview</h2><div class="preview"><iframe src="../index.html"></iframe></div></div></div></div><script>let data={};fetch('../content.json').then(r=>r.json()).then(j=>{data=j;title.value=j.company||'';heroTitle.value=j.heroTitle||'';heroText.value=j.heroText||'';email.value=j.email||'';whatsapp.value=j.whatsapp||'';cyan.value='#27c7d7';blue.value='#3f83df';orange.value='#ff8847';purple.value='#70419a'});function downloadJson(){data.company=title.value;data.heroTitle=heroTitle.value;data.heroText=heroText.value;data.email=email.value;data.whatsapp=whatsapp.value;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='content.json';a.click()}</script></body></html>
